# Usage
#   Start:              docker compose up
#   Stop:               docker compose down
#   Destroy:            docker compose down -v --remove-orphans

services:

  backend:
    container_name: teaching-platform-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      migrations:
        condition: service_completed_successfully
    environment:
      APP_NAME: ${BACKEND_APP_NAME:-Education Management System}
      APP_ENV: ${BACKEND_APP_ENV:-development}
      DEBUG: ${BACKEND_DEBUG:-true}
      SECRET_KEY: ${BACKEND_SECRET_KEY}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      COOKIE_DOMAIN: ${BACKEND_COOKIE_DOMAIN:-localhost}
      COOKIE_SECURE: ${BACKEND_COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${BACKEND_COOKIE_SAMESITE:-lax}
      SESSION_EXPIRE_MINUTES: ${SESSION_EXPIRE_MINUTES:-1440}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-15}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_REGION: ${AWS_REGION:-ap-northeast-1}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-teaching-platform-contracts}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4173}
      SERVICE_API_KEY: ${SERVICE_API_KEY:-}
    ports:
      - ${BACKEND_PORT:-8001}:8000

  redis:
    container_name: teaching-platform-redis
    image: redis:7-alpine
    ports:
      - ${REDIS_PORT:-6379}:6379
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

  frontend:
    container_name: teaching-platform-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8001}
    depends_on:
      backend:
        condition: service_started
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    restart: unless-stopped

  frontend-demo:
    container_name: teaching-platform-frontend-demo
    build:
      context: ./frontend-dennis
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${API_URL:-http://localhost:8001}
    depends_on:
      backend:
        condition: service_started
    ports:
      - ${FRONTEND_PORT:-4173}:3000
    environment:
      - NODE_ENV=production

  nginx:
    container_name: teaching-platform-nginx
    image: nginx:alpine
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - 80:80
    restart: unless-stopped

  db:
    container_name: teaching-platform-db
    image: postgres:15-alpine
    restart: unless-stopped
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - ${POSTGRES_PORT:-5432}:5432

  # Database migrations runner
  migrations:
    container_name: teaching-platform-migrations
    build:
      context: ./scripts
      dockerfile: Dockerfile.migrations
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./supabase/migrations:/migrations:ro
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: "no"

  pgadmin:
    container_name: teaching-platform-pgadmin
    image: dpage/pgadmin4:9.12.0
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.dev
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - pgadmin-data:/var/lib/pgadmin
    entrypoint: >
      /bin/sh -c "
      echo \"db:5432:*:postgres:$$POSTGRES_PASSWORD\" > /tmp/pgpass &&
      chmod 600 /tmp/pgpass &&
      /entrypoint.sh
      "
    ports:
      - ${PGADMIN_PORT:-5050}:80

volumes:
  db-data:
  redis-data:
  pgadmin-data:
