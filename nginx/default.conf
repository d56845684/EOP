server {
    # Listen on port 80
    listen       80;
    server_name  localhost;

    # Set the root directory where the built Vue.js assets are stored
    root   /usr/share/nginx/html;
    index  index.html index.htm;

    # Main location block to handle requests
    location / {
        # SPA Routing Configuration (History Mode Fallback)
        # Attempt to serve:
        # 1. $uri   - An exact file match (e.g., /assets/app.js)
        # 2. $uri/  - A directory match
        # 3. /index.html - If neither file nor directory exists, fallback to the main index.html file
        #    This is essential for Vue Router's History Mode to prevent 404 errors on direct navigation or page refresh.
        try_files $uri $uri/ /index.html;
    }

    # Optional: Cache static assets aggressively (improves performance)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Handle server errors
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
