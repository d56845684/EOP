<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  body { margin:0; padding:0; background:#f4f5f7; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; }
  .wrap { max-width:560px; margin:32px auto; background:#fff; border-radius:8px; border:1px solid #e2e8f0; overflow:hidden; }
  .header { background:#2563eb; padding:24px 32px; color:#fff; font-size:18px; font-weight:600; }
  .body { padding:32px; color:#334155; line-height:1.7; font-size:15px; }
  .info-table { width:100%; border-collapse:collapse; margin:16px 0; }
  .info-table td { padding:8px 12px; border-bottom:1px solid #f1f5f9; }
  .info-table td:first-child { color:#64748b; width:120px; white-space:nowrap; }
  .info-table td:last-child { font-weight:500; }
  .footer { padding:20px 32px; background:#f8fafc; color:#94a3b8; font-size:12px; text-align:center; border-top:1px solid #e2e8f0; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">{{ header_title }}</div>
  <div class="body">
    {% block content %}{% endblock %}
  </div>
  <div class="footer">&copy; {{ year }} EOP 教學管理系統 — 此為系統自動通知，請勿直接回覆</div>
</div>
</body>
</html>
